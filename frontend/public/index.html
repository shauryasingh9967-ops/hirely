<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7c6ff7" />
    <meta name="description" content="Hirely — Find your dream job. Curated opportunities from top companies worldwide." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💼</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Hirely — Find Your Dream Career</title>
    <style>
      html[data-theme="dark"]  body { background:#0a0a0f; color:#f0eeff; }
      html[data-theme="light"] body { background:#f4f3f9; color:#0f0e1a; }
      #initial-loader {
        position:fixed;inset:0;background:#0a0a0f;
        display:flex;align-items:center;justify-content:center;
        z-index:9999;transition:opacity .4s;
      }
      .il-logo {
        width:52px;height:52px;border-radius:16px;
        background:linear-gradient(135deg,#7c6ff7,#f471b5);
        display:flex;align-items:center;justify-content:center;
        font-size:1.5rem;margin:0 auto 16px;
        box-shadow:0 8px 32px rgba(124,111,247,0.4);
        animation:ilpulse 1.5s ease-in-out infinite;
      }
      .il-name { font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-0.03em;color:#f0eeff;text-align:center; }
      .il-sub  { font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;color:#4a4a6a;margin-top:6px;text-align:center;font-weight:500; }
      @keyframes ilpulse {
        0%,100% { transform:scale(1);box-shadow:0 8px 32px rgba(124,111,247,0.4); }
        50%     { transform:scale(1.08);box-shadow:0 12px 42px rgba(124,111,247,0.6); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="initial-loader">
      <div>
        <div class="il-logo">💼</div>
        <div class="il-name">Hirely</div>
        <div class="il-sub">Loading opportunities…</div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Apply saved theme before React loads — prevents flash of wrong theme
      (function() {
        var t = localStorage.getItem('hirely_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'light') {
          var el = document.getElementById('initial-loader');
          if (el) el.style.background = '#f4f3f9';
        }
      })();
      // Hide loader after page load
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('initial-loader');
          if (!el) return;
          el.style.opacity = '0';
          el.style.pointerEvents = 'none';
          setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 420);
        }, 350);
      });
    </script>
  </body>
</html>
